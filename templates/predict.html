<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToxiPredict AI | Predict</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent pt-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-gradient" href="/">ToxiPredict AI</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/predict_page">Prediction</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5 mt-4 position-relative z-index-2">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="glass-card p-5 rounded-4 shadow-lg border border-secondary border-opacity-25">
                    <h2 class="fw-bold mb-4 text-center text-gradient-light">Molecular Data Evaluator</h2>
                    <p class="text-center text-muted mb-5">Enter compound descriptors below to analyze toxicity risk.</p>
                    
                    <form id="predictForm">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label text-light">Molecular Weight</label>
                                <input type="number" step="any" class="form-control custom-input" id="MolecularWeight" name="MolecularWeight" required placeholder="e.g., 350.5">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-light">LogP (Partition Coefficient)</label>
                                <input type="number" step="any" class="form-control custom-input" id="LogP" name="LogP" required placeholder="e.g., 3.2">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-light">TPSA (Topological Polar Surface Area)</label>
                                <input type="number" step="any" class="form-control custom-input" id="TPSA" name="TPSA" required placeholder="e.g., 65.0">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-light">Num H-Donors</label>
                                <input type="number" class="form-control custom-input" id="NumHDonors" name="NumHDonors" required placeholder="e.g., 1">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-light">Num H-Acceptors</label>
                                <input type="number" class="form-control custom-input" id="NumHAcceptors" name="NumHAcceptors" required placeholder="e.g., 3">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-light">Num Rotatable Bonds</label>
                                <input type="number" class="form-control custom-input" id="NumRotatableBonds" name="NumRotatableBonds" required placeholder="e.g., 4">
                            </div>
                            <div class="col-md-6 mx-auto">
                                <label class="form-label text-light">Aromatic Rings</label>
                                <input type="number" class="form-control custom-input" id="AromaticRings" name="AromaticRings" required placeholder="e.g., 2">
                            </div>
                        </div>

                        <div class="text-center mt-5">
                            <button type="submit" class="btn btn-primary btn-lg custom-btn shadow-glow w-50">Predict Toxicity</button>
                        </div>
                    </form>

                    <!-- Result Section -->
                    <div id="resultBox" class="mt-5 p-4 rounded-3 text-center d-none" style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);">
                        <h4 class="fw-bold mb-2">Prediction Result:</h4>
                        <h3 id="predictionText" class="fw-bolder mb-3"></h3>
                        <div class="progress" style="height: 20px; background: rgba(255,255,255,0.1);">
                            <div id="probBar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                        </div>
                        <p id="probText" class="mt-2 mb-0 text-muted small"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Decorative elements -->
    <div class="blob shape-3"></div>

    <script>
        document.getElementById('predictForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                
                if (result.error) {
                    alert("Error: " + result.error);
                    return;
                }

                const resultBox = document.getElementById('resultBox');
                const predText = document.getElementById('predictionText');
                const probBar = document.getElementById('probBar');
                const probText = document.getElementById('probText');

                resultBox.classList.remove('d-none');
                
                const isToxic = result.prediction === "Toxic";
                predText.textContent = result.prediction;
                predText.className = isToxic ? 'fw-bolder mb-3 text-danger' : 'fw-bolder mb-3 text-success';
                
                const percentage = (result.probability * 100).toFixed(2);
                probBar.style.width = percentage + '%';
                probBar.className = isToxic ? 'progress-bar progress-bar-striped progress-bar-animated bg-danger' : 'progress-bar progress-bar-striped progress-bar-animated bg-success';
                probText.textContent = `Toxicity Probability: ${percentage}%`;

            } catch(e) {
                alert("Failed to predict. Make sure your server is running and model is trained.");
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
